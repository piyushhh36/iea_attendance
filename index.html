<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>IEA Clubs Attendance</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; -webkit-tap-highlight-color:transparent; }
    body { background:#000; color:white; min-height:100vh; min-height:-webkit-fill-available; display:flex; justify-content:center; align-items:center; padding:20px; }
    .container { width:100%; max-width:430px; background:#111; border:1px solid #333; border-radius:25px; padding:35px 25px; text-align:center; box-shadow:0 0 30px rgba(255,255,255,0.08); }
    .logo-img { width:100%; max-width:320px; height:auto; border-radius:14px; margin:0 auto 20px auto; display:block; }
    .logo-fallback { width:100%; max-width:320px; height:80px; border-radius:14px; margin:0 auto 20px auto; background:#1b1b1b; border:2px solid #444; display:none; justify-content:center; align-items:center; font-size:36px; font-weight:bold; color:white; letter-spacing:2px; }
    h1 { font-size:26px; line-height:1.4; margin-bottom:8px; }
    h2 { color:#aaa; font-size:16px; font-weight:normal; margin-bottom:25px; }
    .club-options { display:flex; flex-direction:column; gap:12px; margin-top:20px; }
    .club-btn { width:100%; padding:15px; border-radius:12px; background:#1b1b1b; color:white; border:1px solid #333; cursor:pointer; font-size:16px; transition:0.2s; -webkit-appearance:none; appearance:none; }
    .club-btn:hover { background:#252525; border-color:#555; }
    .club-btn.active { background:white; color:black; font-weight:bold; border-color:white; }
    .hidden { display:none; }
    #loginSection { margin-top:25px; }
    input { width:100%; padding:15px; margin-bottom:14px; border-radius:12px; border:1px solid #444; background:#1b1b1b; color:white; font-size:16px; -webkit-appearance:none; appearance:none; }
    input:focus { outline:none; border-color:#888; }
    #markBtn { width:100%; padding:15px; border:none; border-radius:12px; background:white; color:black; font-size:16px; font-weight:bold; cursor:pointer; transition:0.2s; -webkit-appearance:none; appearance:none; }
    #markBtn:hover { background:#ddd; }
    #markBtn:disabled { background:#555; color:#999; cursor:not-allowed; }
    #resultBox { margin-top:22px; padding:18px; background:#1a1a1a; border-radius:15px; display:none; line-height:1.8; }
    .success-title { color:#7CFC98; font-size:18px; font-weight:bold; margin-bottom:14px; }
    .info-row { color:#ddd; margin-bottom:6px; }
    .credit-normal { color:#7CFC98; font-weight:bold; }
    .credit-low { color:#ff6b6b; font-weight:bold; }
    .error-msg { color:#ff8080; font-weight:bold; line-height:1.8; }
    .loading-msg { color:#aaa; }
    .footer { margin-top:22px; color:#555; font-size:12px; }
  </style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD//Z" alt="IEA" class="logo-img" id="logoImg" onerror="showFallbackLogo()">
    <div class="logo-fallback" id="logoFallback">IEA</div>

    <h1>INTERNATIONAL<br>ENGLISH ACADEMY</h1>
    <h2>IEA Clubs Attendance System</h2>

    <div class="club-options">
      <button class="club-btn" data-club="Film Club">🎬 Film Club</button>
      <button class="club-btn" data-club="Reading Club">📚 Reading Club</button>
      <button class="club-btn" data-club="Awareness Club">🌍 Awareness Club</button>
    </div>

    <div id="loginSection" class="hidden">
      <input type="tel" id="phoneInput" placeholder="Enter your 3-digit number"
             maxlength="3" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      <button id="markBtn">Mark Attendance</button>
    </div>

    <div id="resultBox"></div>

    <div class="footer">INTERNATIONAL ENGLISH ACADEMY INDIA</div>

  </div>

<script>

  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8P2BmTiM4YC-t90JU2glX8mvBuIOBshjsevWf0m4ItlI2mrlSlLdlN6oxShduEAaa/exec";

  let selectedClub = "";

  function showFallbackLogo() {
    document.getElementById("logoImg").style.display = "none";
    document.getElementById("logoFallback").style.display = "flex";
  }

  document.querySelectorAll(".club-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".club-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedClub = btn.dataset.club;
      document.getElementById("loginSection").classList.remove("hidden");
      document.getElementById("resultBox").style.display = "none";
      document.getElementById("resultBox").innerHTML = "";
      document.getElementById("phoneInput").value = "";
    });
  });

  document.getElementById("phoneInput").addEventListener("input", function() {
    this.value = this.value.replace(/\D/g, "").slice(0, 3);
  });

  document.getElementById("markBtn").addEventListener("click", async () => {

    const phone = document.getElementById("phoneInput").value.trim();

    if (selectedClub === "") {
      alert("Please select a club first.");
      return;
    }

    if (phone.length !== 3) {
      alert("Please enter a valid 3-digit number.");
      return;
    }

    const btn = document.getElementById("markBtn");
    btn.disabled = true;
    btn.textContent = "Processing...";

    const resultBox = document.getElementById("resultBox");
    resultBox.style.display = "block";
    resultBox.innerHTML = '<div class="loading-msg">⏳ Processing your attendance, please wait...</div>';

    try {

      const url = SCRIPT_URL
        + "?phone=" + encodeURIComponent(phone)
        + "&club="  + encodeURIComponent(selectedClub);

      // iPhone ke liye no-cors workaround
      const response = await fetch(url, {
        method: "GET",
        mode: "cors",
        redirect: "follow"
      });

      const text = await response.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch(parseErr) {
        throw new Error("Invalid server response. Please try again.");
      }

      if (data.status === "success") {

        const oldCredits  = parseInt(data.credits) + 1;
        const newCredits  = parseInt(data.credits);
        const creditClass = (newCredits <= 3) ? "credit-low" : "credit-normal";

        resultBox.innerHTML = `
          <div class="success-title">✅ Attendance Marked Successfully!</div>
          <div class="info-row"><strong>Name:</strong> ${data.name || "N/A"}</div>
          <div class="info-row"><strong>Club:</strong> ${data.club || selectedClub}</div>
          <div class="info-row"><strong>Credits Used:</strong> <span style="color:#ffaa55;font-weight:bold;">${oldCredits} → ${newCredits}</span></div>
          <div class="info-row"><strong>Remaining Credits:</strong> <span class="${creditClass}">${newCredits}</span></div>
          ${newCredits <= 2 ? '<div class="info-row" style="color:#ff6b6b;margin-top:8px;font-weight:bold;font-size:15px;">⚠️ Credits low! Please Register.</div>' : ''}
        `;

      } else {
        resultBox.innerHTML = `<div class="error-msg">❌ ${(data.message || "Something went wrong. Please try again.").replace(/\n/g, "<br>")}</div>`;
      }

    } catch (err) {
      console.error(err);
      resultBox.innerHTML = `<div class="error-msg">❌ Unable to connect. Please check internet and try again.<br><small style="color:#888;">${err.message || ""}</small></div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "Mark Attendance";
    }

  });

</script>
</body>
</html>
